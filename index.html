<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#080c14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="BE-Alert">
  <title>BE-Alert Monitor</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:     #080c14;
      --bg2:    #0f1625;
      --bg3:    #1a2235;
      --border: #1e2d45;
      --text:   #dce8ff;
      --muted:  #4a6080;
      --dim:    #2a3d58;
      --amber:  #f5a623;
      --red:    #ff3b3b;
      --green:  #00e676;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      padding: 1rem 1.25rem 0.75rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
      background: linear-gradient(180deg, #0c1520 0%, var(--bg) 100%);
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.75rem;
      letter-spacing: 0.05em;
      line-height: 1;
      color: var(--amber);
    }
    .logo-sub {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* ── STATUS BAR ── */
    .status-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-bottom: 1px solid var(--border);
    }
    .stat {
      padding: 0.6rem 1rem;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }
    .stat:last-child { border-right: none; }
    .stat-label {
      font-size: 0.55rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
    }
    .stat-value {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--dim);
      transition: color 0.3s;
    }
    .stat-value.ok   { color: var(--green); }
    .stat-value.warn { color: var(--amber); }
    .stat-value.err  { color: var(--red);   }
    .stat-value.idle { color: var(--muted); }

    /* ── MAIN ── */
    main {
      flex: 1;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.875rem;
    }

    /* ── TAP OVERLAY ── */
    #tap-overlay {
      position: fixed;
      inset: 0;
      z-index: 999;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      cursor: pointer;
      transition: opacity 0.5s ease;
    }
    #tap-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .tap-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.5rem;
      color: var(--amber);
      letter-spacing: 0.08em;
    }
    .tap-label {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      animation: blink 1.4s ease-in-out infinite;
    }
    .tap-icon {
      font-size: 3rem;
      animation: tapBounce 1.4s ease-in-out infinite;
    }
    .tap-note {
      font-size: 0.6rem;
      color: var(--dim);
      letter-spacing: 0.1em;
      text-align: center;
      padding: 0 2rem;
      line-height: 1.8;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
    @keyframes tapBounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(8px); }
    }

    .btn-secondary {
      padding: 0.5rem 0.875rem;
      background: var(--bg3);
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 2px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-secondary:hover  { color: var(--text); border-color: var(--dim); }
    .btn-secondary:active { opacity: 0.7; }

    /* ── ALARM BANNER ── */
    #alarm-banner {
      display: none;
      background: var(--red);
      border-radius: 2px;
      padding: 1rem;
      text-align: center;
      animation: alarmPulse 0.8s ease-in-out infinite;
    }
    #alarm-banner.active { display: block; }
    @keyframes alarmPulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.8; }
    }
    .alarm-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 0.08em;
      color: #fff;
    }
    .alarm-items {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.85);
      margin-top: 0.3rem;
      line-height: 1.6;
      white-space: pre-line;
    }
    .btn-dismiss {
      margin-top: 0.75rem;
      padding: 0.4rem 1.25rem;
      background: rgba(0,0,0,0.25);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 2px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      cursor: pointer;
    }

    /* ── SECTION HEADER ── */
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.4rem;
    }
    .section-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
    }
    .badge {
      padding: 0.1rem 0.45rem;
      font-size: 0.6rem;
      font-weight: 700;
      border-radius: 2px;
      background: var(--bg3);
      color: var(--muted);
    }
    .badge.warn { background: var(--amber); color: #000; }

    /* ── ALERT CARDS ── */
    #alerts-list .empty {
      text-align: center;
      color: var(--muted);
      font-size: 0.7rem;
      padding: 1.5rem 0;
      border: 1px dashed var(--border);
      border-radius: 2px;
    }
    .alert-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--dim);
      border-radius: 2px;
      padding: 0.75rem;
      margin-bottom: 0.5rem;
    }
    .alert-card.is-new {
      border-left-color: var(--amber);
      animation: fadeIn 0.4s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .alert-card-top {
      display: flex;
      gap: 0.5rem;
      align-items: flex-start;
    }
    .cat-badge {
      font-size: 0.55rem;
      padding: 0.2rem 0.4rem;
      border-radius: 2px;
      background: var(--bg3);
      color: var(--amber);
      letter-spacing: 0.05em;
      flex-shrink: 0;
      margin-top: 0.1rem;
      text-transform: uppercase;
    }
    .alert-title-text {
      font-size: 0.75rem;
      line-height: 1.45;
      color: var(--text);
    }
    .alert-meta {
      margin-top: 0.45rem;
      font-size: 0.6rem;
      color: var(--muted);
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .new-tag {
      margin-top: 0.4rem;
      font-size: 0.6rem;
      color: var(--amber);
      letter-spacing: 0.08em;
    }

    /* ── LOG ── */
    #log {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 0.5rem 0.75rem;
      height: 9rem;
      overflow-y: auto;
      font-size: 0.62rem;
      line-height: 1.9;
      color: var(--muted);
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    #log .l-ok   { color: var(--green); }
    #log .l-warn { color: var(--amber); }
    #log .l-err  { color: var(--red);   }

    /* ── FOOTER ── */
    footer {
      padding: 0.75rem 1.25rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">BE▲LERT</div>
  <div class="logo-sub">Feed Monitor</div>
</header>

<div class="status-bar">
  <div class="stat">
    <span class="stat-label">Feed</span>
    <span class="stat-value idle" id="s-feed">OFF</span>
  </div>
  <div class="stat">
    <span class="stat-label">Alerts</span>
    <span class="stat-value idle" id="s-alerts">—</span>
  </div>
  <div class="stat">
    <span class="stat-label">Next poll</span>
    <span class="stat-value idle" id="s-next">—</span>
  </div>
</div>

<div id="tap-overlay" onclick="activateAudio()">
  <div class="tap-logo">BE▲LERT</div>
  <div class="tap-icon">👆</div>
  <div class="tap-label">Tap anywhere to activate</div>
  <div class="tap-note">Required once to enable alarm sound.<br>Monitoring starts automatically.</div>
</div>

<main>

  <div id="alarm-banner">
    <div class="alarm-title">⚠ NEW ALERT ISSUED</div>
    <div class="alarm-items" id="alarm-items"></div>
    <button class="btn-dismiss" onclick="dismissAlarm()">Silence alarm</button>
  </div>

  <div>
    <div class="section-head">
      <span class="section-label">Active alerts</span>
      <span class="badge" id="alert-badge">0</span>
    </div>
    <div id="alerts-list">
      <div class="empty">No active alerts</div>
    </div>
  </div>

  <div>
    <div class="section-head">
      <span class="section-label">System log</span>
    </div>
    <div id="log"></div>
  </div>

</main>

<footer>
  <button class="btn-secondary" onclick="testAlarm()">Test alarm</button>
  <button class="btn-secondary" id="btn-poll" onclick="forcePoll()">Poll now</button>
  <button class="btn-secondary" id="btn-stop" onclick="stopMonitor()" style="color:var(--red);border-color:var(--red);display:none">■ Stop</button>
</footer>

<script>
// ════════════════════════════════════════════════════════════════
//  CONFIG
// ════════════════════════════════════════════════════════════════
const FEED_URL      = 'https://publicalerts.be/CapGateway/feed?outdated=false';
const POLL_INTERVAL = 60; // seconds

// ════════════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════════════
let monitoring    = false;
let wakeLock      = null;
let pollTimer     = null;
let cdTimer       = null;
let countdown     = POLL_INTERVAL;
let audioCtx      = null;
let audioReady    = false;   // true only after user tap (browser requirement)
let pendingAlarm  = null;    // items waiting to alarm before audio was ready
let alarmTimer    = null;
let alarmOn       = false;
let knownGuids    = new Set();
let isFirstPoll   = true;

// ════════════════════════════════════════════════════════════════
//  LOGGING
// ════════════════════════════════════════════════════════════════
function log(msg, cls = '') {
  const el = document.getElementById('log');
  const ts = new Date().toLocaleTimeString('fr-BE', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  el.insertAdjacentHTML('beforeend',
    `<span class="${cls ? 'l-' + cls : ''}">[${ts}] ${msg}</span>\n`);
  el.scrollTop = el.scrollHeight;
}

// ════════════════════════════════════════════════════════════════
//  AUDIO ALARM
// ════════════════════════════════════════════════════════════════
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  audioReady = true;
}

function playBeep() {
  if (!audioCtx) return;
  // Two-tone siren: 880 Hz / 660 Hz, four pulses
  [[880, 0], [660, 0.28], [880, 0.56], [660, 0.84]].forEach(([freq, t]) => {
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    const s = audioCtx.currentTime + t;
    osc.frequency.setValueAtTime(freq, s);
    gain.gain.setValueAtTime(0.45, s);
    gain.gain.exponentialRampToValueAtTime(0.001, s + 0.25);
    osc.start(s);
    osc.stop(s + 0.25);
  });
}

function startAlarm(newItems) {
  document.getElementById('alarm-items').textContent =
    newItems.map(i => '• ' + (i.title || i.description || i.guid)).join('\n');
  document.getElementById('alarm-banner').classList.add('active');

  if (!audioReady) {
    // Audio not yet unlocked — store items and play as soon as user taps
    pendingAlarm = newItems;
    log(`⚠ Alert detected — tap screen to hear alarm`, 'warn');
    return;
  }

  pendingAlarm = null;
  if (alarmOn) return; // already ringing, banner already updated above
  alarmOn = true;
  playBeep();
  alarmTimer = setInterval(playBeep, 4000);
  log(`⚠ Alarm — ${newItems.length} new alert(s)`, 'err');
}

function dismissAlarm() {
  alarmOn = false;
  clearInterval(alarmTimer);
  document.getElementById('alarm-banner').classList.remove('active');
  log('Alarm silenced');
}

function testAlarm() {
  initAudio();
  playBeep();
  log('Test beep');
}

// ════════════════════════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════════════════════════
function renderAlerts(items, newGuids) {
  const badge = document.getElementById('alert-badge');
  const list  = document.getElementById('alerts-list');

  badge.textContent = items.length;
  badge.className   = items.length > 0 ? 'badge warn' : 'badge';

  setStat('s-alerts', String(items.length), items.length > 0 ? 'warn' : 'ok');

  if (items.length === 0) {
    list.innerHTML = '<div class="empty">No active alerts in Belgium</div>';
    return;
  }

  list.innerHTML = items.map(item => {
    const isNew = newGuids.has(item.guid);
    const cat   = (item.category || ['ALERT'])[0];
    const exp   = item.expirationDate
      ? new Date(item.expirationDate).toLocaleTimeString('fr-BE', { hour: '2-digit', minute: '2-digit' })
      : '?';
    return `
      <div class="alert-card${isNew ? ' is-new' : ''}">
        <div class="alert-card-top">
          <span class="cat-badge">${cat}</span>
          <span class="alert-title-text">${item.title || item.description || 'Alert'}</span>
        </div>
        <div class="alert-meta">
          <span>Until ${exp}</span>
          <span>${item.lang || ''}</span>
        </div>
        ${isNew ? '<div class="new-tag">▲ NEW</div>' : ''}
      </div>`;
  }).join('');
}

// ════════════════════════════════════════════════════════════════
//  FETCH  (direct → 3 CORS proxies in rotation)
// ════════════════════════════════════════════════════════════════
const PROXIES = [
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
];
let proxyIndex = 0; // start with last-known working proxy

async function fetchAlerts() {
  // 1. Try direct first
  try {
    const res = await fetch(FEED_URL, { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return (await res.json()).items || [];
  } catch {
    log('Direct fetch blocked — trying proxies…', 'warn');
  }

  // 2. Try each proxy, starting from last successful one
  for (let attempt = 0; attempt < PROXIES.length; attempt++) {
    const idx = (proxyIndex + attempt) % PROXIES.length;
    const url = PROXIES[idx](FEED_URL);
    try {
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      proxyIndex = idx; // remember what worked
      log(`Proxy ${idx + 1} OK`, 'warn');
      return json.items || [];
    } catch (err) {
      log(`Proxy ${idx + 1} failed: ${err.message}`, 'err');
    }
  }

  throw new Error('All proxies failed');
}

// ════════════════════════════════════════════════════════════════
//  POLL
// ════════════════════════════════════════════════════════════════
async function poll() {
  setStat('s-feed', 'polling…', 'warn');

  try {
    const items = await fetchAlerts();
    setStat('s-feed', 'OK', 'ok');
    log(`Feed OK — ${items.length} alert(s)`, items.length > 0 ? 'warn' : 'ok');

    // Find GUIDs that are new to us
    const newGuids = new Set();
    for (const item of items) {
      if (!knownGuids.has(item.guid)) {
        newGuids.add(item.guid);
        knownGuids.add(item.guid);
      }
    }

    // Remove expired GUIDs so they can re-alarm if reissued
    const liveGuids = new Set(items.map(i => i.guid));
    for (const g of knownGuids) {
      if (!liveGuids.has(g)) knownGuids.delete(g);
    }

    renderAlerts(items, newGuids);

    // Alarm conditions:
    // 1. First poll and feed is non-empty  → alarm for everything
    // 2. Any subsequent poll with new GUIDs → alarm for new ones
    const toAlarm = isFirstPoll
      ? items                                          // all current items on startup
      : items.filter(i => newGuids.has(i.guid));      // only genuinely new items

    if (toAlarm.length > 0) {
      startAlarm(toAlarm);
    }

    isFirstPoll = false;

  } catch (err) {
    setStat('s-feed', 'ERROR', 'err');
    log(`Fetch error: ${err.message}`, 'err');
  }

  countdown = POLL_INTERVAL;
}

async function forcePoll() {
  clearInterval(cdTimer);
  clearInterval(pollTimer);
  countdown = POLL_INTERVAL;
  await poll();
  startPollLoop();
}

// ════════════════════════════════════════════════════════════════
//  POLL LOOP
// ════════════════════════════════════════════════════════════════
function startPollLoop() {
  pollTimer = setInterval(poll, POLL_INTERVAL * 1000);
  cdTimer   = setInterval(() => {
    countdown--;
    setStat('s-next', countdown + 's', '');
  }, 1000);
}

// ════════════════════════════════════════════════════════════════
//  WAKE LOCK
// ════════════════════════════════════════════════════════════════
async function acquireWakeLock() {
  if (!('wakeLock' in navigator)) {
    log('Wake Lock not supported — keep screen on manually', 'warn');
    return;
  }
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    log('Wake Lock active — screen will stay on', 'ok');
    wakeLock.addEventListener('release', () => log('Wake Lock released', 'warn'));
  } catch (e) {
    log(`Wake Lock failed: ${e.message}`, 'warn');
  }
}

document.addEventListener('visibilitychange', async () => {
  if (monitoring && document.visibilityState === 'visible') {
    if (!wakeLock || wakeLock.released) await acquireWakeLock();
  }
});

// ════════════════════════════════════════════════════════════════
//  ACTIVATE AUDIO  (called by tap overlay — satisfies browser gesture req.)
// ════════════════════════════════════════════════════════════════
async function activateAudio() {
  initAudio();
  document.getElementById('tap-overlay').classList.add('hidden');
  await acquireWakeLock();
  log('Audio activated', 'ok');

  // If an alarm was waiting for audio, fire it now
  if (pendingAlarm) {
    const items = pendingAlarm;
    pendingAlarm = null;
    alarmOn = true;
    playBeep();
    alarmTimer = setInterval(playBeep, 4000);
    log(`⚠ Alarm — ${items.length} alert(s) already active`, 'err');
  }
}

// ════════════════════════════════════════════════════════════════
//  START / STOP
// ════════════════════════════════════════════════════════════════
async function startMonitor() {
  monitoring  = true;
  isFirstPoll = true;
  knownGuids.clear();
  document.getElementById('btn-stop').style.display = '';
  setStat('s-feed', 'starting…', 'warn');
  log('Monitoring started', 'ok');
  await poll();
  startPollLoop();
}

function stopMonitor() {
  monitoring = false;
  clearInterval(pollTimer);
  clearInterval(cdTimer);
  if (wakeLock) { try { wakeLock.release(); } catch {} wakeLock = null; }
  if (alarmOn) dismissAlarm();
  document.getElementById('btn-stop').style.display = 'none';
  setStat('s-feed',   'OFF', 'idle');
  setStat('s-alerts', '—',   'idle');
  setStat('s-next',   '—',   'idle');
  log('Monitoring stopped');
}

// ════════════════════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════════════════════
function setStat(id, text, cls) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className   = 'stat-value ' + (cls || '');
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// Auto-start polling as soon as the page loads
window.addEventListener('DOMContentLoaded', startMonitor);
</script>
</body>
</html>
